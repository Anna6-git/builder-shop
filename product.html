<!doctype html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Товар — БудМаркет</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="mobileHeader">
  <div class="mobileHeader__top mobileHeader__top--back">
    <button class="topBackBtn" id="productBackBtn" type="button" aria-label="Назад">←</button>

    <a href="index.html" class="mobileBrand mobileBrand--logoOnly" aria-label="БудМаркет">
      <img
        src="assets/logo.png"
        alt="БудМаркет"
        class="mobileBrand__logo mobileBrand__logo--main"
        id="productHeaderLogo"
        onerror="this.style.display='none'"
      >
    </a>

    <a class="cartBtnTop" href="cart.html" aria-label="Перейти в кошик">
      <svg class="cartIconSvg" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M3 4h2l2.2 9.2a1 1 0 0 0 1 .8h8.8a1 1 0 0 0 1-.8L20 7H7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="10" cy="19" r="1.6" fill="currentColor"/>
        <circle cx="17" cy="19" r="1.6" fill="currentColor"/>
      </svg>
      <span id="cartCount">0</span>
    </a>
  </div>
</header>

<main class="page productPage">
  <section class="productPage__card">
    <div class="productPage__imageWrap">
      <img id="productImg" class="productPage__img" src="" alt="Товар">
    </div>

    <div>
      <h1 id="productTitle" class="productPage__title">Товар</h1>
      <div id="productMeta" class="productPage__meta">Категорія • Бренд • Наявність</div>
      <div id="productPrice" class="productPage__price">0.00 ₴</div>
<div id="productCode" class="productPage__code">ID товару: —</div>
<div id="productCustomBadge" class="productCustomBadge" hidden>
  ПІД ЗАМОВЛЕННЯ
</div>

<div id="productCustomHint" class="hint" style="margin-top:10px;" hidden>
  За деталями зверніться до консультанта.
</div>


      <div class="productPage__qtyRow">
        <span>Кількість:</span>
        <div class="qty">
          <button id="pMinus" type="button">−</button>
          <input id="pQty" type="number" min="1" step="1" value="1">
          <button id="pPlus" type="button">+</button>
        </div>
      </div>

      <div class="productPage__qtyRow">
        <span>Фасування:</span>
        <select id="pUnit" class="unitSelect"></select>
      </div>
      <label id="productCustomNoteLabel" class="cLabel" hidden style="display:block; margin-top:14px;">
  Уточнення до замовлення
</label>

<textarea
  id="productCustomNote"
  class="cInput"
  hidden
  rows="4"
  placeholder="Вкажіть уточнення до замовлення"
></textarea>

<div class="productPage__actions">
  <button id="addToCartBtn" class="btnPrimary btnAddCart" type="button">Додати в кошик</button>
  <a href="cart.html" class="btn btnGoCart">Перейти в кошик</a>
  <button id="productEditBtn" class="btnGhost" type="button" hidden>Редагувати</button>
  <button id="productDeleteBtn" class="btnDanger" type="button" hidden>Видалити</button>
</div>
      <div id="productHint" class="hint" style="margin-top:10px;"></div>
    </div>
  </section>

  <section class="productPage__descCard">
    <h2 class="sectionTitle">Інформація про товар</h2>
    <div id="productDescription" class="productPage__description" style="margin-top:10px;">
      Опис відсутній.
    </div>
  </section>

<section class="productPage__relatedCard">
  <div class="relatedHead">
    <h2 class="sectionTitle">Може вас зацікавити</h2>
    <button id="addRelatedProductBtn" class="btnPrimary" type="button" hidden>Додати товар</button>
  </div>
  <div id="relatedGrid" class="prodGrid" style="margin-top:12px;"></div>
</section>
</main>

<div class="authOverlay" id="adminProductOverlay" hidden></div>
<div class="authModal adminModal" id="adminProductModal" aria-hidden="true" hidden>
  <div class="authTop">
    <div class="authTitle" id="adminProductTitle">Редагувати товар</div>
    <button class="authClose" id="adminProductClose" type="button">✕</button>
  </div>

  <div class="authBody">
    <label class="authLabel">Назва товару</label>
    <input class="authInput" id="pTitleInput" placeholder="Назва">

    <label class="authLabel">Категорія</label>
    <select class="authInput" id="pCategoryInput"></select>

    <label class="authLabel">Ціна</label>
    <input class="authInput" id="pPriceInput" type="number" step="0.01" placeholder="14.50">

    <label class="authLabel">Виробник</label>
    <input class="authInput" id="pBrandInput" placeholder="Knauf">

    <label class="authLabel">Одиниця виміру</label>
    <input class="authInput" id="pUnitInput" placeholder="шт / мішок / м2">

    <label class="authLabel">Тип товару</label>
<select class="authInput" id="pOrderTypeInput">
  <option value="stock">Звичайний товар</option>
  <option value="custom">Під замовлення</option>
</select>




    <label class="authLabel">ID товару</label>
    <input class="authInput" id="pIdInput" readonly>

    <label class="authLabel">Кількість на складі</label>
    <input class="authInput" id="pStockInput" type="number" step="0.1" placeholder="0">

    <label class="authLabel">Опис</label>
    <textarea class="authInput" id="pDescInput" rows="4" placeholder="Опис товару"></textarea>

    <label class="authLabel">ID пов’язаних товарів</label>
    <input class="authInput" id="pRelatedInput" placeholder="Напр. 12,15,19">

    <label class="authLabel">Фото URL</label>
    <input class="authInput" id="pImgInput" placeholder="https://...">

    <label class="authLabel">Або завантажити фото</label>
    <input class="authInput" id="pFileInput" type="file" accept="image/*">

    <div class="adminPreviewWrap">
      <img id="pPreview" class="adminPreviewImg" alt="" hidden>
    </div>

    <div class="adminFormActions">
      <button class="btnPrimary" id="saveProductBtn" type="button">Зберегти</button>
      <button class="btnDanger" id="deleteProductBtn" type="button">Видалити</button>
    </div>

    <div class="authHint" id="productFormHint"></div>
  </div>
</div>

<div class="authOverlay" id="relatedPickerOverlay" hidden></div>
<div class="authModal adminModal" id="relatedPickerModal" aria-hidden="true" hidden>
  <div class="authTop">
    <div class="authTitle">Додати товар у пов’язані</div>
    <button class="authClose" id="relatedPickerClose" type="button">✕</button>
  </div>

  <div class="authBody">
    <label class="authLabel">Пошук за ID або назвою</label>
    <input
      class="authInput"
      id="relatedPickerSearch"
      placeholder="Наприклад: 15 або Газобетон"
      type="text"
    >

    <div class="authHint" id="relatedPickerHint"></div>
    <div id="relatedPickerResults" class="adminList"></div>
  </div>
</div>

<script src="config.js"></script>
<script src="product.js"></script>
</body>
</html>
